<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotspot Preview 1024x1024</title>
    <style>
        :root {
            --bg: #0b1020;
            --panel: #111933;
            --text: #e6ecff;
            --muted: #9fb0e0;
            --ok: #29cc7a;
            --warn: #ffb020;
            --card: #4cc9f0;
            --object: #f72585;
            --other: #ffd166;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #1b2550, var(--bg));
            color: var(--text);
        }

        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 16px;
        }

        .panel {
            background: rgba(17, 25, 51, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 12px;
            padding: 14px;
        }

        h1 {
            font-size: 20px;
            margin: 0 0 10px;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .row {
            margin-top: 10px;
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--muted);
        }

        input[type="text"],
        input[type="file"],
        textarea,
        button {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            background: #0d1530;
            color: var(--text);
            padding: 9px 10px;
            font-size: 13px;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        button {
            cursor: pointer;
            background: linear-gradient(135deg, #2f70ff, #33b6ff);
            border: none;
            font-weight: 600;
        }

        button.secondary {
            background: #19244b;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .checks {
            margin-top: 12px;
            display: grid;
            gap: 7px;
            font-size: 13px;
        }

        .score-box {
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            background: rgba(255, 255, 255, 0.04);
            font-size: 13px;
        }

        .score-pass {
            color: var(--ok);
        }

        .score-fail {
            color: #ff6b6b;
        }

        .ok {
            color: var(--ok);
        }

        .warn {
            color: var(--warn);
        }

        .workspace {
            display: grid;
            gap: 10px;
        }

        .viewer {
            position: relative;
            background: rgba(17, 25, 51, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 12px;
            overflow: auto;
            min-height: 560px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 12px;
        }

        .stack {
            position: relative;
            width: fit-content;
            height: fit-content;
        }

        #sceneImage {
            max-width: min(100%, 940px);
            height: auto;
            display: block;
            border-radius: 10px;
        }

        #overlay {
            position: absolute;
            inset: 0;
            pointer-events: auto;
        }

        .legend {
            display: flex;
            gap: 14px;
            font-size: 12px;
            color: var(--muted);
            align-items: center;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            display: inline-block;
            margin-right: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            background: rgba(17, 25, 51, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 10px;
            overflow: hidden;
        }

        th,
        td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 9px;
            text-align: left;
        }

        th {
            color: var(--muted);
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .toolbar.single {
            grid-template-columns: 1fr;
        }

        .coord {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
        }

        .dropzone {
            margin-top: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.28);
            border-radius: 10px;
            padding: 10px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.15s ease;
        }

        .dropzone.active {
            border-color: #33b6ff;
            color: #d8f2ff;
            background: rgba(51, 182, 255, 0.12);
        }

        .path-hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
            line-height: 1.4;
            word-break: break-all;
        }

        @media (max-width: 980px) {
            .page {
                grid-template-columns: 1fr;
            }

            #sceneImage {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <section class="panel">
            <h1>Hotspot 校验页</h1>
            <div class="muted">
                用于校验 1024x1024 场景图与 items_data 的重合度。支持新结构（词条 + regions）和旧扁平结构。
            </div>

            <div class="row">
                <label>图片文件（推荐）</label>
                <input id="imageFile" type="file" accept="image/*" />

                <label>JSON 文件（推荐）</label>
                <input id="jsonFile" type="file" accept="application/json,.json" />

                <label>或图片 URL / 路径</label>
                <input id="imageUrl" type="text" placeholder="https://.../scene.png 或 /Users/.../scene.png" />

                <label>场景资料根目录（全局默认）</label>
                <input id="baseRoot" type="text" placeholder="/Users/.../kiki_web/doc/card-generation/scene-info" />

                <label>scene_slug / card_slug</label>
                <div class="toolbar" style="margin-top:0;">
                    <input id="sceneSlug" type="text" placeholder="demo_animals" />
                    <input id="cardSlug" type="text" placeholder="kiki_dongwuyuan" />
                </div>
                <label>图片扩展名（默认 jpg）</label>
                <input id="imageExt" type="text" placeholder="jpg" />

                <label>或 JSON URL / 路径</label>
                <input id="jsonPath" type="text"
                    placeholder="kiki_web/doc/card-generation/scene-info/demo_animals/kiki_dongwuyuan/kiki_dongwuyuan.json" />
                <div class="path-hint">支持相对路径、绝对路径、http(s) 地址。推荐把 JSON 路径固定后重复使用。</div>

                <label>或 JSON 文本粘贴</label>
                <textarea id="jsonText" placeholder='[{"type":"chinese", ...}]'></textarea>
            </div>

            <div class="dropzone" id="dropzone">
                拖拽图片和 JSON 到这里（或拖到整个页面）自动识别加载
            </div>

            <div class="toolbar">
                <button id="loadBtn">加载并绘制</button>
                <button id="clearBtn" class="secondary">清空</button>
            </div>

            <div class="toolbar">
                <button id="prefillBtn" class="secondary">一键填充默认 JSON 路径</button>
                <button id="savePathBtn" class="secondary">记住当前路径</button>
            </div>

            <div class="toolbar">
                <button id="applyScenePathBtn" class="secondary">按 scene/card 自动生成路径</button>
                <button id="fillDemoBtn" class="secondary">填充示例（animals）</button>
            </div>

            <div class="toolbar">
                <button id="beginEditBtn" class="secondary">开始编辑（启用拖拽）</button>
                <button id="endEditBtn" class="secondary">结束编辑（锁定拖拽）</button>
            </div>

            <div class="toolbar single">
                <button id="writeBackJsonBtn" class="secondary">一键回写当前 JSON</button>
            </div>

            <div class="toolbar">
                <button id="growSelectedBtn" class="secondary">放大选中框</button>
                <button id="shrinkSelectedBtn" class="secondary">缩小选中框</button>
            </div>

            <div class="toolbar single">
                <button id="downloadJsonBtn" class="secondary">下载修改后 JSON</button>
            </div>

            <div class="toolbar single">
                <button id="revertEditsBtn" class="secondary">返回原始坐标（撤销本次编辑）</button>
            </div>

            <div class="path-hint" id="editHint">拖拽编辑：关；无未回写修改；回写权限未授权（首次一键回写会请求授权）。</div>
            <div class="path-hint" id="selectedHint">未选中热区（点击画布或表格可选中）。</div>

            <div class="checks" id="checks"></div>
            <div class="score-box" id="scoreBox">评分：- / 100（通过线：89）</div>
            <div class="coord" id="coord">cursor: -, -</div>
        </section>

        <section class="workspace">
            <div class="legend">
                <span><span class="dot" style="background: var(--card)"></span>card</span>
                <span><span class="dot" style="background: var(--object)"></span>object</span>
                <span><span class="dot" style="background: var(--other)"></span>other</span>
            </div>

            <div class="viewer">
                <div class="stack" id="stack">
                    <img id="sceneImage" alt="scene" />
                    <canvas id="overlay"></canvas>
                </div>
            </div>

            <table id="table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>id</th>
                        <th>text</th>
                        <th>label</th>
                        <th>pair_dx</th>
                        <th>rect</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <script>
        const imageEl = document.getElementById('sceneImage');
        const canvas = document.getElementById('overlay');
        const checksEl = document.getElementById('checks');
        const scoreBoxEl = document.getElementById('scoreBox');
        const tbody = document.querySelector('#table tbody');
        const coordEl = document.getElementById('coord');

        const imageFileEl = document.getElementById('imageFile');
        const jsonFileEl = document.getElementById('jsonFile');
        const imageUrlEl = document.getElementById('imageUrl');
        const baseRootEl = document.getElementById('baseRoot');
        const sceneSlugEl = document.getElementById('sceneSlug');
        const cardSlugEl = document.getElementById('cardSlug');
        const imageExtEl = document.getElementById('imageExt');
        const jsonPathEl = document.getElementById('jsonPath');
        const jsonTextEl = document.getElementById('jsonText');
        const dropzoneEl = document.getElementById('dropzone');
        const editHintEl = document.getElementById('editHint');
        const selectedHintEl = document.getElementById('selectedHint');
        const beginEditBtn = document.getElementById('beginEditBtn');
        const endEditBtn = document.getElementById('endEditBtn');
        const growSelectedBtn = document.getElementById('growSelectedBtn');
        const shrinkSelectedBtn = document.getElementById('shrinkSelectedBtn');
        const revertEditsBtn = document.getElementById('revertEditsBtn');
        const downloadJsonBtn = document.getElementById('downloadJsonBtn');
        const writeBackJsonBtn = document.getElementById('writeBackJsonBtn');

        const STORAGE_KEYS = {
            imagePath: 'hotspot.preview.imagePath',
            jsonPath: 'hotspot.preview.jsonPath',
            baseRoot: 'hotspot.preview.baseRoot',
            sceneSlug: 'hotspot.preview.sceneSlug',
            cardSlug: 'hotspot.preview.cardSlug',
            imageExt: 'hotspot.preview.imageExt'
        };

        document.getElementById('loadBtn').addEventListener('click', loadAndDraw);
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('prefillBtn').addEventListener('click', prefillDefaults);
        document.getElementById('savePathBtn').addEventListener('click', savePaths);
        document.getElementById('applyScenePathBtn').addEventListener('click', applyScenePath);
        document.getElementById('fillDemoBtn').addEventListener('click', fillDemo);
        beginEditBtn.addEventListener('click', () => setEditMode(true));
        endEditBtn.addEventListener('click', () => setEditMode(false));
        growSelectedBtn.addEventListener('click', () => resizeSelectedRegion(8));
        shrinkSelectedBtn.addEventListener('click', () => resizeSelectedRegion(-8));
        revertEditsBtn.addEventListener('click', revertToOriginalCoords);
        downloadJsonBtn.addEventListener('click', downloadEditedJson);
        writeBackJsonBtn.addEventListener('click', writeBackEditedJson);

        let flatRegions = [];
        let drawRetryTimer = null;
        let currentJsonData = null;
        let originalJsonData = null;
        let jsonWritebackHandle = null;
        let editMode = false;
        let hasUnsavedChanges = false;
        let selectedRegionIndex = -1;
        let activeDrag = null;
        let lastValidationLines = [];
        const DIRECT_WRITEBACK_ENDPOINT = 'http://127.0.0.1:18765/api/hotspot/write-json';

        function typeColor(type) {
            if (type === 'card') return getComputedStyle(document.documentElement).getPropertyValue('--card').trim();
            if (type === 'object') return getComputedStyle(document.documentElement).getPropertyValue('--object').trim();
            return getComputedStyle(document.documentElement).getPropertyValue('--other').trim();
        }

        function normalizeRect(coord) {
            const xs = coord.map(p => p.x);
            const ys = coord.map(p => p.y);
            const minX = Math.min(...xs);
            const maxX = Math.max(...xs);
            const minY = Math.min(...ys);
            const maxY = Math.max(...ys);
            return { minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY };
        }

        function displayIndex(region, fallbackIndex) {
            if (Number.isInteger(region.index)) return region.index;
            return fallbackIndex + 1;
        }

        function centerX(coord) {
            const xs = coord.map(p => p.x);
            return (Math.min(...xs) + Math.max(...xs)) / 2;
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function deepCloneJson(value) {
            return JSON.parse(JSON.stringify(value));
        }

        function updateEditHint(extraMessage = '') {
            const editLabel = editMode ? '开' : '关';
            const dirtyLabel = hasUnsavedChanges ? '有未回写修改' : '无未回写修改';
            const bindLabel = jsonWritebackHandle ? '回写权限已就绪（授权模式）' : '优先直写绝对路径（无弹窗，需本地直写服务）';
            const msg = extraMessage ? `；${extraMessage}` : '';
            editHintEl.textContent = `拖拽编辑：${editLabel}；${dirtyLabel}；${bindLabel}${msg}`;
        }

        function updateSelectedHint(extraMessage = '') {
            if (!flatRegions.length || selectedRegionIndex < 0 || selectedRegionIndex >= flatRegions.length) {
                selectedHintEl.textContent = '未选中热区（点击画布或表格可选中）。';
                return;
            }

            const region = flatRegions[selectedRegionIndex];
            const idx = displayIndex(region, selectedRegionIndex);
            const regionType = (region.regionType || '-').toLowerCase();
            const itemId = region.itemId || '-';
            const text = region.text || '-';
            const rect = normalizeRect(region.coordinate);
            const pairKey = `${idx}|${itemId}|${regionType}|${text}`;
            const msg = extraMessage ? `；${extraMessage}` : '';
            selectedHintEl.textContent = `已选中：index=${idx}，id=${itemId}，type=${regionType}，text=${text}，rect=${rect.minX},${rect.minY}→${rect.maxX},${rect.maxY}，key=${pairKey}${msg}`;
        }

        function updateEditButtonsState() {
            beginEditBtn.disabled = editMode;
            endEditBtn.disabled = !editMode;
        }

        function updateActionButtonsState() {
            const hasSelected = selectedRegionIndex >= 0 && selectedRegionIndex < flatRegions.length;
            growSelectedBtn.disabled = !editMode || !hasSelected;
            shrinkSelectedBtn.disabled = !editMode || !hasSelected;
            revertEditsBtn.disabled = !hasUnsavedChanges;
        }

        function applyRegionRect(region, minX, minY, maxX, maxY) {
            region.coordinate = toRectCoordinate(minX, minY, maxX, maxY);
            syncRegionToSource(region);
            hasUnsavedChanges = true;
            updateEditHint();
            updateActionButtonsState();
            drawOverlay();
            renderTable(flatRegions);
            updateSelectedHint();
            refreshValidation();
        }

        function resizeSelectedRegion(stepPx) {
            if (!editMode) {
                showMessage({ ok: false, msg: '请先点击“开始编辑（启用拖拽）”。' });
                return;
            }
            if (selectedRegionIndex < 0 || selectedRegionIndex >= flatRegions.length) {
                showMessage({ ok: false, msg: '请先在画布或表格里选中一个热区。' });
                return;
            }

            const region = flatRegions[selectedRegionIndex];
            const rect = normalizeRect(region.coordinate);
            let minX = rect.minX - stepPx;
            let minY = rect.minY - stepPx;
            let maxX = rect.maxX + stepPx;
            let maxY = rect.maxY + stepPx;

            if ((maxX - minX) < 24 || (maxY - minY) < 24) {
                showMessage({ ok: false, msg: '继续缩小会导致热区过小，已阻止。' });
                return;
            }

            minX = clamp(Math.round(minX), 0, 1022);
            minY = clamp(Math.round(minY), 0, 1022);
            maxX = clamp(Math.round(maxX), 1, 1023);
            maxY = clamp(Math.round(maxY), 1, 1023);
            if (maxX <= minX || maxY <= minY) return;

            applyRegionRect(region, minX, minY, maxX, maxY);
        }

        function revertToOriginalCoords() {
            if (!originalJsonData) {
                showMessage({ ok: false, msg: '当前没有可恢复的原始数据。' });
                return;
            }

            currentJsonData = deepCloneJson(originalJsonData);
            flatRegions = flattenItemsData(currentJsonData);
            hasUnsavedChanges = false;
            selectedRegionIndex = -1;
            activeDrag = null;
            drawOverlay();
            scheduleOverlayDrawRetry();
            renderTable(flatRegions);
            refreshValidation();
            updateEditHint('已恢复到本次加载前坐标');
            updateSelectedHint();
            updateActionButtonsState();
        }

        function showMessage(line) {
            const merged = [line];
            if (lastValidationLines.length) merged.push(...lastValidationLines);
            showChecks(merged);
        }

        function refreshValidation() {
            if (!imageEl.naturalWidth || !imageEl.naturalHeight || !flatRegions.length) return;
            const result = validate(imageEl.naturalWidth, imageEl.naturalHeight, flatRegions);
            lastValidationLines = result.lines;
            showChecks(result.lines);
            renderScore(result.score, result.pass);
        }

        function toRectCoordinate(minX, minY, maxX, maxY) {
            return [
                { x: minX, y: minY },
                { x: maxX, y: minY },
                { x: minX, y: maxY },
                { x: maxX, y: maxY }
            ];
        }

        function syncRegionToSource(region) {
            if (!currentJsonData || !Number.isInteger(region.sourceItemIndex)) return;
            const item = currentJsonData[region.sourceItemIndex];
            if (!item) return;

            const points = region.coordinate.map(p => ({
                x: Math.round(p.x),
                y: Math.round(p.y)
            }));
            region.coordinate = points;

            if (region.sourceType === 'regions') {
                if (Array.isArray(item.regions) && item.regions[region.sourceRegionIndex]) {
                    item.regions[region.sourceRegionIndex].coordinate = points.map(p => ({ x: p.x, y: p.y }));
                }
            } else if (Array.isArray(item.coordinate)) {
                item.coordinate = points.map(p => ({ x: p.x, y: p.y }));
            }
        }

        function suggestedJsonFilename() {
            const path = (jsonPathEl.value || '').trim();
            if (path) {
                const parts = path.split('/');
                return parts[parts.length - 1] || 'hotspot-edited.json';
            }
            const card = (cardSlugEl.value || '').trim();
            return `${card || 'hotspot-edited'}.json`;
        }

        function setEditMode(enabled) {
            editMode = enabled;
            if (!editMode) activeDrag = null;
            canvas.style.pointerEvents = 'auto';
            canvas.style.cursor = editMode ? 'grab' : 'default';
            updateEditButtonsState();
            updateActionButtonsState();
            updateEditHint();
            updateSelectedHint();
            if (flatRegions.length) drawOverlay();
        }

        function isPickerAbortError(err) {
            if (!err) return false;
            if (err.name === 'AbortError') return true;
            const msg = String(err.message || err);
            return /aborted a request/i.test(msg);
        }

        function isAbsoluteLocalPath(path) {
            if (!path) return false;
            if (path.startsWith('/')) return true;
            return /^[A-Za-z]:[\\/]/.test(path);
        }

        function normalizeJsonPathForWriteback(rawPath) {
            const value = (rawPath || '').trim();
            if (!value) return '';
            if (value.startsWith('file://')) {
                try {
                    return decodeURIComponent(new URL(value).pathname);
                } catch (err) {
                    return value.replace(/^file:\/\//, '');
                }
            }
            return value;
        }

        async function postJsonWithTimeout(url, payload, timeoutMs = 1600) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                return await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
            } finally {
                clearTimeout(timer);
            }
        }

        async function tryDirectWritebackByPath() {
            const jsonPath = normalizeJsonPathForWriteback(jsonPathEl.value || '');
            if (!isAbsoluteLocalPath(jsonPath)) {
                return { attempted: false, ok: false, path: '' };
            }

            const text = `${JSON.stringify(currentJsonData, null, 2)}\n`;
            try {
                const resp = await postJsonWithTimeout(DIRECT_WRITEBACK_ENDPOINT, {
                    path: jsonPath,
                    text
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    return {
                        attempted: true,
                        ok: false,
                        path: jsonPath,
                        error: `直写服务返回 ${resp.status}${errText ? `: ${errText}` : ''}`
                    };
                }

                return { attempted: true, ok: true, path: jsonPath };
            } catch (err) {
                return {
                    attempted: true,
                    ok: false,
                    path: jsonPath,
                    error: `未连接到直写服务（${DIRECT_WRITEBACK_ENDPOINT}）`
                };
            }
        }

        async function ensureWritebackHandle() {
            if (jsonWritebackHandle) return true;
            if (!window.showOpenFilePicker) {
                throw new Error('当前环境不支持直接回写文件，请使用“下载修改后 JSON”。');
            }

            const handles = await window.showOpenFilePicker({
                multiple: false,
                types: [{
                    description: 'JSON',
                    accept: { 'application/json': ['.json'] }
                }]
            });

            if (!handles || !handles.length) return false;
            jsonWritebackHandle = handles[0];
            updateEditHint(`已授权文件：${jsonWritebackHandle.name}`);
            return true;
        }

        async function writeBackEditedJson() {
            if (!currentJsonData) {
                showMessage({ ok: false, msg: '请先加载 JSON 再回写。' });
                return;
            }

            const directResult = await tryDirectWritebackByPath();
            if (directResult.ok) {
                hasUnsavedChanges = false;
                updateEditHint(`已直写：${directResult.path}`);
                updateActionButtonsState();
                showMessage({ ok: true, msg: `已直写到目标文件：${directResult.path}` });
                return;
            }
            if (directResult.attempted) {
                updateEditHint('直写服务未就绪（未弹授权框）');
                showMessage({ ok: false, msg: `${directResult.error}；请先启动直写服务，或使用“下载修改后 JSON”。` });
                return;
            }

            try {
                const hasHandle = await ensureWritebackHandle();
                if (!hasHandle || !jsonWritebackHandle) {
                    showMessage({ ok: false, msg: '已取消授权，未执行回写。再次点击“一键回写当前 JSON”可重试。' });
                    return;
                }

                const writable = await jsonWritebackHandle.createWritable();
                const text = `${JSON.stringify(currentJsonData, null, 2)}\n`;
                await writable.write(text);
                await writable.close();
                hasUnsavedChanges = false;
                updateEditHint();
                updateActionButtonsState();
                showMessage({ ok: true, msg: `已回写：${jsonWritebackHandle.name}` });
            } catch (err) {
                if (isPickerAbortError(err)) {
                    showMessage({ ok: false, msg: '已取消授权，未执行回写。再次点击“一键回写当前 JSON”可重试。' });
                    return;
                }
                showMessage({ ok: false, msg: `回写失败：${err.message || String(err)}` });
            }
        }

        function downloadEditedJson() {
            if (!currentJsonData) {
                showMessage({ ok: false, msg: '请先加载 JSON 再下载。' });
                return;
            }

            const text = `${JSON.stringify(currentJsonData, null, 2)}\n`;
            const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = suggestedJsonFilename();
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);

            showMessage({ ok: true, msg: `已下载修改后 JSON：${link.download}` });
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function buildRegionLabel(region, fallbackIndex) {
            const idx = displayIndex(region, fallbackIndex);
            const rt = (region.regionType || 'card').toLowerCase();
            const text = String(region.text || '').trim();
            return text ? `${idx}:${rt}:${text}` : `${idx}:${rt}`;
        }

        function computePairDxStats(regions, maxDxThreshold = 120) {
            const byItem = new Map();
            const fallbackMap = new Map();

            regions.forEach((r, idx) => {
                if (!Array.isArray(r.coordinate)) return;
                const fallbackKey = `idx_${displayIndex(r, idx)}`;
                const key = (r.itemId || '').trim() || fallbackKey;
                if (!byItem.has(key)) {
                    byItem.set(key, {
                        itemId: key,
                        text: (r.text || '').trim(),
                        card: null,
                        object: null
                    });
                }
                const bucket = byItem.get(key);
                const rt = String(r.regionType || '').toLowerCase();
                if (rt === 'card' && !bucket.card) bucket.card = r.coordinate;
                if (rt === 'object' && !bucket.object) bucket.object = r.coordinate;
                fallbackMap.set(idx, key);
            });

            const pairDxByItemId = {};
            let pairedCount = 0;
            let missingPair = 0;
            let maxDx = 0;
            let overDxCount = 0;
            const overDxItems = [];

            byItem.forEach((bucket, key) => {
                if (!bucket.card || !bucket.object) {
                    missingPair += 1;
                    return;
                }
                pairedCount += 1;
                const dx = Math.abs(centerX(bucket.card) - centerX(bucket.object));
                pairDxByItemId[key] = dx;
                if (dx > maxDx) maxDx = dx;
                if (dx > maxDxThreshold) {
                    overDxCount += 1;
                    overDxItems.push(`${bucket.text || key}:${dx.toFixed(1)}`);
                }
            });

            return {
                pairDxByItemId,
                fallbackMap,
                pairedCount,
                missingPair,
                maxDx,
                overDxCount,
                overDxItems
            };
        }

        function flattenItemsData(items) {
            const out = [];
            for (let itemIndex = 0; itemIndex < items.length; itemIndex += 1) {
                const item = items[itemIndex];
                if (item && Array.isArray(item.regions)) {
                    item.regions.forEach((r, i) => {
                        if (!Array.isArray(r.coordinate)) return;
                        out.push({
                            index: item.index,
                            itemId: item.id,
                            text: item.text,
                            regionType: r.region_type || r.region_role || 'card',
                            coordinate: r.coordinate.map(p => ({ x: Number(p.x), y: Number(p.y) })),
                            runtimeId: r.id || `${item.id}_${r.region_type || 'card'}_${i + 1}`,
                            sourceType: 'regions',
                            sourceItemIndex: itemIndex,
                            sourceRegionIndex: i
                        });
                    });
                } else if (item && Array.isArray(item.coordinate)) {
                    out.push({
                        index: item.index,
                        itemId: item.id,
                        text: item.text,
                        regionType: item.region_role || 'card',
                        coordinate: item.coordinate.map(p => ({ x: Number(p.x), y: Number(p.y) })),
                        runtimeId: item.id,
                        sourceType: 'legacy',
                        sourceItemIndex: itemIndex,
                        sourceRegionIndex: -1
                    });
                }
            }
            return out;
        }

        async function fileToText(file) {
            return await file.text();
        }

        function pathToUrl(input) {
            const p = (input || '').trim();
            if (!p) return '';
            if (p.startsWith('http://') || p.startsWith('https://') || p.startsWith('file://')) return p;
            if (p.startsWith('/')) return `file://${p}`;
            return p;
        }

        function normalizeRoot(p) {
            return (p || '').trim().replace(/\/$/, '');
        }

        function applyScenePath() {
            const root = normalizeRoot(baseRootEl.value);
            const scene = (sceneSlugEl.value || '').trim();
            const card = (cardSlugEl.value || '').trim();
            const ext = (imageExtEl.value || 'jpg').trim().replace('.', '');

            if (!root || !scene || !card) {
                showChecks([{ ok: false, msg: '请先填写 baseRoot / scene_slug / card_slug' }]);
                return;
            }

            const baseCardDir = `${root}/${scene}/${card}`;
            imageUrlEl.value = `${baseCardDir}/${card}.${ext}`;
            jsonPathEl.value = `${baseCardDir}/${card}.json`;
            savePaths();
            showChecks([{ ok: true, msg: '已按规范生成图片与 JSON 路径（同名）' }]);
        }

        function fillDemo() {
            sceneSlugEl.value = 'demo_animals';
            cardSlugEl.value = 'kiki_dongwuyuan';
            imageExtEl.value = 'jpg';
            applyScenePath();
        }

        function showChecks(lines) {
            checksEl.innerHTML = lines.map(l => `<div class="${l.ok ? 'ok' : 'warn'}">${l.ok ? '✓' : '⚠'} ${l.msg}</div>`).join('');
        }

        function overlapRatio(a, b) {
            const interW = Math.max(0, Math.min(a.maxX, b.maxX) - Math.max(a.minX, b.minX));
            const interH = Math.max(0, Math.min(a.maxY, b.maxY) - Math.max(a.minY, b.minY));
            const inter = interW * interH;
            if (inter <= 0) return 0;
            const areaA = Math.max(1, a.w * a.h);
            const areaB = Math.max(1, b.w * b.h);
            return inter / Math.min(areaA, areaB);
        }

        function renderScore(score, pass) {
            const cls = pass ? 'score-pass' : 'score-fail';
            scoreBoxEl.className = `score-box ${cls}`;
            scoreBoxEl.textContent = `评分：${score} / 100（通过线：89） - ${pass ? 'PASS' : 'FAIL'}`;
        }

        function validate(imageW, imageH, regions) {
            const lines = [];
            lines.push({ ok: imageW === 1024 && imageH === 1024, msg: `图片尺寸 ${imageW}x${imageH}（要求 1024x1024）` });
            lines.push({ ok: regions.length > 0, msg: `热区数量 ${regions.length}` });

            let outOfBounds = 0;
            let badPoints = 0;
            let tinyAreas = 0;
            const keySet = new Set();
            let duplicated = 0;
            let overlaps = 0;
            const rects = [];

            regions.forEach(r => {
                const key = `${r.index}-${r.itemId}-${r.regionType}-${JSON.stringify(r.coordinate)}`;
                if (keySet.has(key)) duplicated += 1;
                keySet.add(key);

                if (!Array.isArray(r.coordinate) || r.coordinate.length !== 4) {
                    badPoints += 1;
                    return;
                }

                for (const p of r.coordinate) {
                    if (!Number.isInteger(p.x) || !Number.isInteger(p.y)) badPoints += 1;
                    if (p.x < 0 || p.x > 1023 || p.y < 0 || p.y > 1023) outOfBounds += 1;
                }

                const rect = normalizeRect(r.coordinate);
                const minArea = r.regionType === 'object' ? 36 * 36 : 48 * 48;
                if (rect.w * rect.h < minArea) tinyAreas += 1;
                rects.push({ ...rect, regionType: r.regionType, itemId: r.itemId });
            });

            for (let i = 0; i < rects.length; i += 1) {
                for (let j = i + 1; j < rects.length; j += 1) {
                    if (rects[i].itemId && rects[i].itemId === rects[j].itemId) continue;
                    const ratio = overlapRatio(rects[i], rects[j]);
                    if (ratio > 0.1) overlaps += 1;
                }
            }

            const pairStats = computePairDxStats(regions, 120);

            lines.push({ ok: badPoints === 0, msg: `坐标点格式检查（四点、整数）异常 ${badPoints}` });
            lines.push({ ok: outOfBounds === 0, msg: `越界点数量 ${outOfBounds}` });
            lines.push({ ok: duplicated === 0, msg: `重复热区数量 ${duplicated}` });
            lines.push({ ok: tinyAreas === 0, msg: `过小热区数量 ${tinyAreas}（card>=48x48, object>=36x36）` });
            lines.push({ ok: overlaps === 0, msg: `跨词重叠风险 ${overlaps}（重叠占比 > 10%）` });
            lines.push({ ok: pairStats.missingPair === 0, msg: `card/object 配对缺失 ${pairStats.missingPair}` });
            lines.push({ ok: pairStats.overDxCount === 0, msg: `配对横向偏移超阈值(>120px) ${pairStats.overDxCount}，max_dx=${pairStats.maxDx.toFixed(1)}` });
            if (pairStats.overDxItems.length) {
                lines.push({ ok: false, msg: `超阈值词条：${pairStats.overDxItems.join('；')}` });
            }

            let score = 100;
            if (!(imageW === 1024 && imageH === 1024)) score -= 30;
            if (regions.length === 0) score -= 40;
            score -= Math.min(20, badPoints * 2);
            score -= Math.min(20, outOfBounds * 2);
            score -= Math.min(10, duplicated * 2);
            score -= Math.min(10, tinyAreas * 2);
            score -= Math.min(10, overlaps * 2);
            score -= Math.min(15, pairStats.missingPair * 5);
            score -= Math.min(20, pairStats.overDxCount * 8);
            score = Math.max(0, score);

            const pass = score >= 89;
            lines.unshift({ ok: pass, msg: `评分 ${score}/100，阈值 89（${pass ? '通过' : '不通过'}）` });

            return { lines, score, pass };
        }

        function renderTable(regions) {
            tbody.innerHTML = '';
            const pairStats = computePairDxStats(regions, 120);
            regions.forEach((r, idx) => {
                const rect = normalizeRect(r.coordinate);
                const label = buildRegionLabel(r, idx);
                const fallbackKey = `idx_${displayIndex(r, idx)}`;
                const key = ((r.itemId || '').trim() || pairStats.fallbackMap.get(idx) || fallbackKey);
                const pairDx = pairStats.pairDxByItemId[key];
                const pairDxText = Number.isFinite(pairDx) ? pairDx.toFixed(1) : '-';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${displayIndex(r, idx)}</td>
          <td>${escapeHtml(r.itemId || '-')}</td>
          <td>${escapeHtml(r.text || '-')}</td>
          <td>${escapeHtml(label)}</td>
          <td>${pairDxText}</td>
          <td>${rect.minX},${rect.minY} → ${rect.maxX},${rect.maxY}</td>
        `;
                if (idx === selectedRegionIndex) {
                    tr.style.background = 'rgba(51, 182, 255, 0.18)';
                }
                tr.style.cursor = 'pointer';
                tr.addEventListener('click', () => {
                    selectedRegionIndex = idx;
                    drawOverlay();
                    renderTable(flatRegions);
                    updateSelectedHint();
                    updateActionButtonsState();
                });
                tbody.appendChild(tr);
            });
        }

        function drawOverlay() {
            if (!imageEl.naturalWidth || !imageEl.naturalHeight) return;
            const cssW = imageEl.clientWidth;
            const cssH = imageEl.clientHeight;
            if (!cssW || !cssH) return;

            canvas.width = cssW;
            canvas.height = cssH;
            canvas.style.width = `${cssW}px`;
            canvas.style.height = `${cssH}px`;

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, cssW, cssH);

            const sx = cssW / imageEl.naturalWidth;
            const sy = cssH / imageEl.naturalHeight;

            flatRegions.forEach((r, i) => {
                const rect = normalizeRect(r.coordinate);
                const x = rect.minX * sx;
                const y = rect.minY * sy;
                const w = rect.w * sx;
                const h = rect.h * sy;
                const isSelected = i === selectedRegionIndex;

                const color = typeColor(r.regionType);

                ctx.fillStyle = color + '22';
                ctx.strokeStyle = color;
                ctx.lineWidth = isSelected ? 3 : 2;
                ctx.fillRect(x, y, w, h);
                ctx.strokeRect(x, y, w, h);

                if (isSelected) {
                    ctx.strokeStyle = '#ffffff';
                    ctx.setLineDash([5, 3]);
                    ctx.strokeRect(x - 1, y - 1, w + 2, h + 2);
                    ctx.setLineDash([]);
                }

                ctx.fillStyle = color;
                ctx.font = '12px sans-serif';
                const label = buildRegionLabel(r, i);
                const textY = Math.max(14, y + 13);
                const textWidth = Math.ceil(ctx.measureText(label).width);
                const bgW = Math.min(Math.max(textWidth + 8, 24), Math.max(24, cssW - x - 2));
                ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
                ctx.fillRect(x + 1, textY - 11, bgW, 14);
                ctx.fillStyle = color;
                ctx.fillText(label, x + 4, textY);
            });
        }

        function getPointerImageCoord(event) {
            if (!imageEl.naturalWidth || !imageEl.clientWidth || !imageEl.clientHeight) return null;
            const rect = imageEl.getBoundingClientRect();
            const x = (event.clientX - rect.left) * (imageEl.naturalWidth / imageEl.clientWidth);
            const y = (event.clientY - rect.top) * (imageEl.naturalHeight / imageEl.clientHeight);
            return {
                x: clamp(Math.round(x), 0, imageEl.naturalWidth - 1),
                y: clamp(Math.round(y), 0, imageEl.naturalHeight - 1)
            };
        }

        function hitTestRegionIndex(x, y) {
            for (let i = flatRegions.length - 1; i >= 0; i -= 1) {
                const rect = normalizeRect(flatRegions[i].coordinate);
                if (x >= rect.minX && x <= rect.maxX && y >= rect.minY && y <= rect.maxY) {
                    return i;
                }
            }
            return -1;
        }

        function onCanvasMouseDown(event) {
            if (!flatRegions.length) return;
            const point = getPointerImageCoord(event);
            if (!point) return;

            const index = hitTestRegionIndex(point.x, point.y);
            if (index < 0) {
                selectedRegionIndex = -1;
                drawOverlay();
                renderTable(flatRegions);
                updateSelectedHint();
                updateActionButtonsState();
                return;
            }

            event.preventDefault();
            selectedRegionIndex = index;
            if (!editMode) {
                drawOverlay();
                renderTable(flatRegions);
                updateSelectedHint('已选中，点击“开始编辑”后可拖拽与放大/缩小');
                updateActionButtonsState();
                return;
            }

            const rect = normalizeRect(flatRegions[index].coordinate);
            activeDrag = {
                index,
                startX: point.x,
                startY: point.y,
                originRect: rect
            };
            canvas.style.cursor = 'grabbing';
            drawOverlay();
            renderTable(flatRegions);
            updateSelectedHint();
            updateActionButtonsState();
        }

        function onWindowMouseMove(event) {
            if (!activeDrag) return;
            const point = getPointerImageCoord(event);
            if (!point) return;

            const region = flatRegions[activeDrag.index];
            if (!region) return;

            const dx = point.x - activeDrag.startX;
            const dy = point.y - activeDrag.startY;

            const rect = activeDrag.originRect;
            const minX = clamp(Math.round(rect.minX + dx), 0, 1023 - rect.w);
            const minY = clamp(Math.round(rect.minY + dy), 0, 1023 - rect.h);
            const maxX = minX + rect.w;
            const maxY = minY + rect.h;

            region.coordinate = toRectCoordinate(minX, minY, maxX, maxY);
            syncRegionToSource(region);
            hasUnsavedChanges = true;
            updateEditHint();
            updateActionButtonsState();
            drawOverlay();
            renderTable(flatRegions);
            updateSelectedHint();
        }

        function onWindowMouseUp() {
            if (!activeDrag) return;
            activeDrag = null;
            if (editMode) canvas.style.cursor = 'grab';
            refreshValidation();
        }

        function scheduleOverlayDrawRetry(maxAttempts = 24) {
            if (drawRetryTimer) {
                clearTimeout(drawRetryTimer);
                drawRetryTimer = null;
            }

            let attempt = 0;
            const run = () => {
                if (!flatRegions.length || !imageEl.naturalWidth || !imageEl.naturalHeight) return;
                if (imageEl.clientWidth > 0 && imageEl.clientHeight > 0) {
                    drawOverlay();
                    return;
                }
                attempt += 1;
                if (attempt >= maxAttempts) return;
                drawRetryTimer = setTimeout(run, 40);
            };

            run();
        }

        async function loadImage() {
            if (imageFileEl.files && imageFileEl.files[0]) {
                const url = URL.createObjectURL(imageFileEl.files[0]);
                imageEl.src = url;
                await imageEl.decode();
                return;
            }

            const raw = imageUrlEl.value.trim();
            if (!raw) throw new Error('请提供图片文件或图片 URL/路径');
            const url = pathToUrl(raw);
            if (url.startsWith('http://') || url.startsWith('https://')) {
                imageEl.crossOrigin = 'anonymous';
            }
            imageEl.src = url;
            await imageEl.decode();
        }

        async function loadJson() {
            let text = '';
            if (jsonFileEl.files && jsonFileEl.files[0]) {
                text = await fileToText(jsonFileEl.files[0]);
            } else if (jsonTextEl.value.trim()) {
                text = jsonTextEl.value.trim();
            } else if (jsonPathEl.value.trim()) {
                const url = pathToUrl(jsonPathEl.value.trim());
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`JSON 路径加载失败: ${resp.status}`);
                text = await resp.text();
            }

            if (!text) throw new Error('请提供 JSON 文件、JSON 文本或 JSON 路径');
            return JSON.parse(text);
        }

        async function loadAndDraw() {
            try {
                await loadImage();
                const data = await loadJson();
                if (!Array.isArray(data)) throw new Error('JSON 根节点必须是数组');

                currentJsonData = data;
                originalJsonData = deepCloneJson(data);
                flatRegions = flattenItemsData(data);
                selectedRegionIndex = -1;
                activeDrag = null;
                hasUnsavedChanges = false;
                drawOverlay();
                scheduleOverlayDrawRetry();
                renderTable(flatRegions);
                refreshValidation();
                updateEditHint();
                updateSelectedHint();
                updateActionButtonsState();
                savePaths();
            } catch (err) {
                showChecks([{ ok: false, msg: err.message || String(err) }]);
                renderScore(0, false);
            }
        }

        function prefillDefaults() {
            if (!jsonPathEl.value.trim()) {
                jsonPathEl.value = 'kiki_web/doc/card-generation/scene-info/demo_animals/kiki_dongwuyuan/kiki_dongwuyuan.json';
            }
            showChecks([{ ok: true, msg: '已填充默认 JSON 路径，请补充图片路径或拖拽图片文件' }]);
        }

        function savePaths() {
            try {
                localStorage.setItem(STORAGE_KEYS.imagePath, imageUrlEl.value || '');
                localStorage.setItem(STORAGE_KEYS.jsonPath, jsonPathEl.value || '');
                localStorage.setItem(STORAGE_KEYS.baseRoot, baseRootEl.value || '');
                localStorage.setItem(STORAGE_KEYS.sceneSlug, sceneSlugEl.value || '');
                localStorage.setItem(STORAGE_KEYS.cardSlug, cardSlugEl.value || '');
                localStorage.setItem(STORAGE_KEYS.imageExt, imageExtEl.value || '');
            } catch (e) {
                // ignore storage failures in restricted environments
            }
        }

        function restorePaths() {
            try {
                const img = localStorage.getItem(STORAGE_KEYS.imagePath) || '';
                const json = localStorage.getItem(STORAGE_KEYS.jsonPath) || '';
                const root = localStorage.getItem(STORAGE_KEYS.baseRoot) || '';
                const scene = localStorage.getItem(STORAGE_KEYS.sceneSlug) || '';
                const card = localStorage.getItem(STORAGE_KEYS.cardSlug) || '';
                const ext = localStorage.getItem(STORAGE_KEYS.imageExt) || '';
                if (img) imageUrlEl.value = img;
                if (json) jsonPathEl.value = json;
                if (root) baseRootEl.value = root;
                if (scene) sceneSlugEl.value = scene;
                if (card) cardSlugEl.value = card;
                if (ext) imageExtEl.value = ext;
            } catch (e) {
                // ignore
            }
        }

        function applyQueryParams() {
            try {
                const params = new URLSearchParams(window.location.search || '');
                if (!params.toString()) return { autoload: false };

                const image = params.get('image') || '';
                const json = params.get('json') || '';
                const baseRoot = params.get('baseRoot') || '';
                const scene = params.get('scene') || '';
                const card = params.get('card') || '';
                const ext = params.get('ext') || '';

                if (image) imageUrlEl.value = image;
                if (json) jsonPathEl.value = json;
                if (baseRoot) baseRootEl.value = baseRoot;
                if (scene) sceneSlugEl.value = scene;
                if (card) cardSlugEl.value = card;
                if (ext) imageExtEl.value = ext;

                const autoloadRaw = (params.get('autoload') || '').toLowerCase();
                const autoload = autoloadRaw === '1' || autoloadRaw === 'true' || autoloadRaw === 'yes';
                return { autoload };
            } catch (e) {
                return { autoload: false };
            }
        }

        function applyDroppedFiles(files) {
            let imageFound = false;
            let jsonFound = false;

            for (const file of files) {
                if (!imageFound && file.type.startsWith('image/')) {
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    imageFileEl.files = dt.files;
                    imageFound = true;
                    continue;
                }

                const lowerName = file.name.toLowerCase();
                if (!jsonFound && (file.type === 'application/json' || lowerName.endsWith('.json'))) {
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    jsonFileEl.files = dt.files;
                    jsonFound = true;
                }
            }

            if (imageFound || jsonFound) {
                showChecks([{ ok: true, msg: `已识别拖拽文件：图片 ${imageFound ? '✓' : '×'} / JSON ${jsonFound ? '✓' : '×'}` }]);
            }
        }

        function clearAll() {
            imageEl.removeAttribute('src');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flatRegions = [];
            currentJsonData = null;
            originalJsonData = null;
            jsonWritebackHandle = null;
            hasUnsavedChanges = false;
            activeDrag = null;
            selectedRegionIndex = -1;
            lastValidationLines = [];
            tbody.innerHTML = '';
            checksEl.innerHTML = '';
            scoreBoxEl.className = 'score-box';
            scoreBoxEl.textContent = '评分：- / 100（通过线：89）';
            coordEl.textContent = 'cursor: -, -';
            imageFileEl.value = '';
            jsonFileEl.value = '';
            imageUrlEl.value = '';
            baseRootEl.value = '';
            sceneSlugEl.value = '';
            cardSlugEl.value = '';
            imageExtEl.value = '';
            jsonPathEl.value = '';
            jsonTextEl.value = '';
            setEditMode(false);
            updateEditHint();
            updateSelectedHint();
            updateActionButtonsState();
        }

        ['dragenter', 'dragover'].forEach(evt => {
            window.addEventListener(evt, (e) => {
                e.preventDefault();
                dropzoneEl.classList.add('active');
            });
        });

        ['dragleave', 'drop'].forEach(evt => {
            window.addEventListener(evt, (e) => {
                e.preventDefault();
                if (evt === 'drop') {
                    applyDroppedFiles(e.dataTransfer.files || []);
                }
                dropzoneEl.classList.remove('active');
            });
        });

        document.getElementById('stack').addEventListener('mousemove', (e) => {
            if (!imageEl.naturalWidth || !imageEl.clientWidth) return;
            const rect = imageEl.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) * (imageEl.naturalWidth / imageEl.clientWidth));
            const y = Math.round((e.clientY - rect.top) * (imageEl.naturalHeight / imageEl.clientHeight));
            coordEl.textContent = `cursor: ${x}, ${y}`;
        });

        window.addEventListener('resize', () => {
            if (flatRegions.length) drawOverlay();
        });

        canvas.addEventListener('mousedown', onCanvasMouseDown);
        window.addEventListener('mousemove', onWindowMouseMove);
        window.addEventListener('mouseup', onWindowMouseUp);

        imageEl.addEventListener('load', () => {
            if (flatRegions.length) scheduleOverlayDrawRetry();
        });

        restorePaths();
        setEditMode(false);
        updateEditHint();
        const queryOptions = applyQueryParams();
        if (!baseRootEl.value.trim()) {
            baseRootEl.value = '/Users/qisd/Documents/development/my_project/kiki_chain/kiki_web/doc/card-generation/scene-info';
        }
        if (!sceneSlugEl.value.trim()) sceneSlugEl.value = 'demo_animals';
        if (!cardSlugEl.value.trim()) cardSlugEl.value = 'kiki_dongwuyuan';
        if (!imageExtEl.value.trim()) imageExtEl.value = 'jpg';
        if (queryOptions.autoload) {
            loadAndDraw();
        }
    </script>
</body>

</html>
