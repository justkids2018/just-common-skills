<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>卡片一键验证</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 24px;
            background: #0b1020;
            color: #e6ecff;
        }

        a {
            color: #4cc9f0;
        }
    </style>
</head>

<body>
    <p id="status">正在准备跳转到验收页...</p>
    <p><a id="manualLink" href="#">如果未自动跳转，点这里</a></p>
    <script>
        (function () {
            function decodePathname(pathname) {
                return decodeURIComponent((pathname || '').replace(/\/$/, ''));
            }

            const cardDirUrl = new URL('./', window.location.href);
            const sceneDirUrl = new URL('../', cardDirUrl);
            const sceneInfoDirUrl = new URL('../', sceneDirUrl);
            const previewUrl = new URL('../../../hotspot-preview.html', cardDirUrl);

            const card = decodeURIComponent(cardDirUrl.pathname.split('/').filter(Boolean).pop() || '');
            const scene = decodeURIComponent(sceneDirUrl.pathname.split('/').filter(Boolean).pop() || '');
            const ext = 'png';

            const baseRoot = decodePathname(sceneInfoDirUrl.pathname);
            const image = decodePathname(new URL(`./${card}.normalized.${ext}`, cardDirUrl).pathname);
            const json = decodePathname(new URL(`./${card}.json`, cardDirUrl).pathname);

            const params = new URLSearchParams({
                baseRoot,
                scene,
                card,
                ext,
                image,
                json,
                autoload: '1',
                mode: 'oneclick'
            });

            const target = `${previewUrl.href}?${params.toString()}`;
            document.title = `${card || '卡片'} 一键验证`;
            document.getElementById('status').textContent = `正在跳转到验收页：${card || '-'}（绝对路径模式）`;
            document.getElementById('manualLink').href = target;
            window.location.replace(target);
        })();
    </script>
</body>

</html>
