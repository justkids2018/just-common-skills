name: release
on:
  release:
    types: [published]
jobs:
  validate-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep

      - name: Re-run full validation against tagged commit
        run: make test

      - name: Verify version consistency
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
            TAG_VERSION="${{ github.event.release.tag_name }}"
            if [ "v${VERSION}" != "${TAG_VERSION}" ]; then
              echo "Version mismatch: VERSION file has ${VERSION}, tag is ${TAG_VERSION}"
              exit 1
            fi
            echo "Version consistency verified: ${VERSION}"
          else
            echo "No VERSION file found, skipping version check"
          fi

      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Just-Common-Skills ${{ github.event.release.tag_name }}

          ### Installation

          ```bash
          git clone https://github.com/${{ github.repository }} ~/just-common-skills
          cd ~/just-common-skills
          git checkout ${{ github.event.release.tag_name }}
          ./scripts/install-skills.sh
          ```

          ### What's Included

          - 1 orchestrator: `just-dev-pipeline`
          - 7 core workers: `just-plan-eng-review`, `just-qa`, `just-review`, `just-ship`, `just-document-release`, `just-investigate`, `just-careful`
          - 7 specialized skills: CI/CD, deployment, analysis, and domain-specific workflows
          - 6 baseline standards documents

          ### Documentation

          - [README.md](https://github.com/${{ github.repository }}/blob/${{ github.event.release.tag_name }}/README.md)
          - [Quickstart Guide](https://github.com/${{ github.repository }}/blob/${{ github.event.release.tag_name }}/docs/quickstart-new-project.md)
          - [Framework Comparison](https://github.com/${{ github.repository }}/blob/${{ github.event.release.tag_name }}/docs/framework-comparison-waza-vs-just.md)

          EOF

          gh release edit "${{ github.event.release.tag_name }}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Package skills
        run: make package

      - name: Upload package to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/just-common-skills.zip \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Notify release completion
        run: |
          echo "✅ Release ${{ github.event.release.tag_name }} validated and published"
          echo "📦 Skills count: $(find skills/just-* -maxdepth 0 -type d | wc -l)"
          echo "📄 Baseline docs: $(find common-prompt/baseline/*.md | wc -l)"
          echo "📦 Package: just-common-skills.zip uploaded"
